services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: patch
      POSTGRES_PASSWORD: patch
      POSTGRES_DB: patch
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patch"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://patch:patch@db:5432/patch
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Mount the directory containing the repos you want to scan (read-only).
      # Then track repos with paths like /repos/<repo-name> in the dashboard.
      - ${REPOS_DIR:-~/MyProjects}:/repos:ro

volumes:
  pgdata:
